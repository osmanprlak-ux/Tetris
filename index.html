<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Tetris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background: #0a0a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
            max-width: 420px;
            padding: 8px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 4px;
        }

        .score-panel {
            display: flex;
            gap: 16px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            color: #8888cc;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
        }

        .next-piece-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .next-label {
            color: #8888cc;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #next-canvas {
            background: #111140;
            border-radius: 6px;
            border: 1px solid #333366;
        }

        #game-canvas {
            border: 2px solid #4444aa;
            border-radius: 8px;
            background: #111140;
            display: block;
            width: 100%;
            max-width: 300px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
            width: 100%;
            max-width: 340px;
            margin-top: 4px;
        }

        .btn {
            background: linear-gradient(145deg, #2a2a5e, #1a1a44);
            border: 2px solid #4444aa;
            border-radius: 14px;
            color: #ccccff;
            font-size: 28px;
            padding: 16px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            background: linear-gradient(145deg, #4444aa, #2a2a6e);
            border-color: #6666cc;
            transform: scale(0.95);
        }

        .btn-rotate {
            grid-column: span 2;
        }

        .btn-drop {
            grid-column: span 2;
        }

        .bottom-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 100%;
            max-width: 340px;
            margin-top: 4px;
        }

        .btn-action {
            background: linear-gradient(145deg, #2e1a5e, #1a1044);
            border: 2px solid #6a44aa;
            border-radius: 14px;
            color: #ddaaff;
            font-size: 15px;
            font-weight: bold;
            padding: 14px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
        }

        .btn-action:active {
            background: linear-gradient(145deg, #5a3aaa, #3a2a6e);
            transform: scale(0.95);
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 20px;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            color: #fff;
            font-size: 36px;
            text-shadow: 0 0 20px #6666ff;
        }

        .overlay h2 {
            color: #aaa;
            font-size: 18px;
            font-weight: normal;
        }

        .overlay .final-score {
            color: #ffcc00;
            font-size: 48px;
            font-weight: bold;
        }

        .overlay-btn {
            background: linear-gradient(145deg, #4444aa, #2a2a6e);
            border: 2px solid #6666cc;
            border-radius: 14px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            padding: 16px 48px;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .overlay-btn:active {
            background: linear-gradient(145deg, #6666cc, #4444aa);
            transform: scale(0.95);
        }

        .high-score-text {
            color: #ffcc00;
            font-size: 14px;
        }

        /* Ghost piece effect via canvas */

        @media (max-height: 680px) {
            .btn { padding: 12px 0; font-size: 24px; }
            .btn-action { padding: 10px 0; font-size: 13px; }
            .stat-value { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="top-bar">
        <div class="score-panel">
            <div class="stat">
                <div class="stat-label">Skor</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Seviye</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">Satır</div>
                <div class="stat-value" id="lines">0</div>
            </div>
        </div>
        <div class="next-piece-container">
            <span class="next-label">Sıra</span>
            <canvas id="next-canvas" width="80" height="80"></canvas>
        </div>
    </div>

    <canvas id="game-canvas" width="300" height="600"></canvas>

    <div class="controls">
        <button class="btn" id="btn-left">◀</button>
        <button class="btn btn-rotate" id="btn-rotate">↻</button>
        <button class="btn" id="btn-right">▶</button>
    </div>

    <div class="bottom-controls">
        <button class="btn-action" id="btn-down">▼ AŞAĞI</button>
        <button class="btn-action" id="btn-drop">⬇ BIRAK</button>
    </div>
</div>

<!-- Start Overlay -->
<div class="overlay" id="start-overlay">
    <h1>🎮 TETRIS</h1>
    <h2>Mobil Tetris Oyunu</h2>
    <button class="overlay-btn" id="start-btn">BAŞLA</button>
    <div class="high-score-text" id="high-score-start"></div>
</div>

<!-- Game Over Overlay -->
<div class="overlay hidden" id="gameover-overlay">
    <h1>OYUN BİTTİ</h1>
    <div class="final-score" id="final-score">0</div>
    <h2 id="gameover-subtitle">puan kazandın!</h2>
    <button class="overlay-btn" id="restart-btn">YENİDEN OYNA</button>
    <div class="high-score-text" id="high-score-end"></div>
</div>

<script>
// ==================== TETRIS ENGINE ====================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nextCtx = nextCanvas.getContext('2d');

const COLS = 10;
const ROWS = 20;
const BLOCK = 30; // pixels per block

// Colors for pieces
const COLORS = {
    I: '#00f0f0',
    O: '#f0f000',
    T: '#a000f0',
    S: '#00f000',
    Z: '#f00000',
    J: '#0000f0',
    L: '#f0a000'
};

const GLOW = {
    I: '#66ffff',
    O: '#ffff66',
    T: '#cc66ff',
    S: '#66ff66',
    Z: '#ff6666',
    J: '#6666ff',
    L: '#ffcc66'
};

// Piece shapes (rotation states)
const SHAPES = {
    I: [[[0,0],[1,0],[2,0],[3,0]], [[0,0],[0,1],[0,2],[0,3]]],
    O: [[[0,0],[1,0],[0,1],[1,1]]],
    T: [[[0,0],[1,0],[2,0],[1,1]], [[0,0],[0,1],[0,2],[1,1]], [[1,0],[0,1],[1,1],[2,1]], [[1,0],[1,1],[1,2],[0,1]]],
    S: [[[1,0],[2,0],[0,1],[1,1]], [[0,0],[0,1],[1,1],[1,2]]],
    Z: [[[0,0],[1,0],[1,1],[2,1]], [[1,0],[1,1],[0,1],[0,2]]],
    J: [[[0,0],[0,1],[1,1],[2,1]], [[0,0],[1,0],[0,1],[0,2]], [[0,0],[1,0],[2,0],[2,1]], [[1,0],[1,1],[1,2],[0,2]]],
    L: [[[2,0],[0,1],[1,1],[2,1]], [[0,0],[0,1],[0,2],[1,2]], [[0,0],[1,0],[2,0],[0,1]], [[0,0],[1,0],[1,1],[1,2]]]
};

const PIECE_TYPES = ['I','O','T','S','Z','J','L'];

let board = [];
let current = null;
let next = null;
let score = 0;
let level = 1;
let lines = 0;
let gameOver = false;
let paused = false;
let dropInterval = 800;
let lastDrop = 0;
let animationId = null;
let highScore = parseInt(localStorage.getItem('tetris-highscore') || '0');

function initBoard() {
    board = [];
    for (let r = 0; r < ROWS; r++) {
        board.push(new Array(COLS).fill(null));
    }
}

function randomPiece() {
    const type = PIECE_TYPES[Math.floor(Math.random() * PIECE_TYPES.length)];
    return {
        type,
        rotation: 0,
        x: Math.floor(COLS / 2) - 1,
        y: 0
    };
}

function getBlocks(piece) {
    const shape = SHAPES[piece.type][piece.rotation % SHAPES[piece.type].length];
    return shape.map(([dx, dy]) => ({ x: piece.x + dx, y: piece.y + dy }));
}

function isValid(piece) {
    const blocks = getBlocks(piece);
    for (const b of blocks) {
        if (b.x < 0 || b.x >= COLS || b.y >= ROWS) return false;
        if (b.y >= 0 && board[b.y][b.x]) return false;
    }
    return true;
}

function lockPiece() {
    const blocks = getBlocks(current);
    for (const b of blocks) {
        if (b.y < 0) { gameOver = true; return; }
        board[b.y][b.x] = current.type;
    }
    clearLines();
    current = next;
    next = randomPiece();
    if (!isValid(current)) gameOver = true;
}

function clearLines() {
    let cleared = 0;
    for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r].every(cell => cell !== null)) {
            board.splice(r, 1);
            board.unshift(new Array(COLS).fill(null));
            cleared++;
            r++; // recheck this row
        }
    }
    if (cleared > 0) {
        const points = [0, 100, 300, 500, 800];
        score += points[cleared] * level;
        lines += cleared;
        level = Math.floor(lines / 10) + 1;
        dropInterval = Math.max(100, 800 - (level - 1) * 70);
        updateUI();
    }
}

function getGhostY() {
    let ghost = { ...current };
    while (isValid({ ...ghost, y: ghost.y + 1 })) {
        ghost.y++;
    }
    return ghost.y;
}

function moveLeft() {
    if (gameOver || paused) return;
    const moved = { ...current, x: current.x - 1 };
    if (isValid(moved)) current = moved;
}

function moveRight() {
    if (gameOver || paused) return;
    const moved = { ...current, x: current.x + 1 };
    if (isValid(moved)) current = moved;
}

function moveDown() {
    if (gameOver || paused) return;
    const moved = { ...current, y: current.y + 1 };
    if (isValid(moved)) {
        current = moved;
        score += 1;
        updateUI();
    } else {
        lockPiece();
    }
}

function rotate() {
    if (gameOver || paused) return;
    const maxRot = SHAPES[current.type].length;
    const rotated = { ...current, rotation: (current.rotation + 1) % maxRot };
    // Wall kick attempts
    const kicks = [0, -1, 1, -2, 2];
    for (const kick of kicks) {
        const kicked = { ...rotated, x: rotated.x + kick };
        if (isValid(kicked)) { current = kicked; return; }
    }
}

function hardDrop() {
    if (gameOver || paused) return;
    while (isValid({ ...current, y: current.y + 1 })) {
        current.y++;
        score += 2;
    }
    lockPiece();
    updateUI();
}

// ==================== DRAWING ====================
function drawBlock(context, x, y, type, alpha = 1) {
    const px = x * BLOCK;
    const py = y * BLOCK;
    context.globalAlpha = alpha;
    context.fillStyle = COLORS[type];
    context.fillRect(px + 1, py + 1, BLOCK - 2, BLOCK - 2);

    // Highlight
    context.fillStyle = GLOW[type];
    context.fillRect(px + 1, py + 1, BLOCK - 2, 4);
    context.fillRect(px + 1, py + 1, 4, BLOCK - 2);

    // Shadow
    context.fillStyle = 'rgba(0,0,0,0.3)';
    context.fillRect(px + BLOCK - 4, py + 1, 3, BLOCK - 2);
    context.fillRect(px + 1, py + BLOCK - 4, BLOCK - 2, 3);

    context.globalAlpha = 1;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid lines
    ctx.strokeStyle = 'rgba(50,50,120,0.3)';
    ctx.lineWidth = 0.5;
    for (let c = 1; c < COLS; c++) {
        ctx.beginPath();
        ctx.moveTo(c * BLOCK, 0);
        ctx.lineTo(c * BLOCK, canvas.height);
        ctx.stroke();
    }
    for (let r = 1; r < ROWS; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * BLOCK);
        ctx.lineTo(canvas.width, r * BLOCK);
        ctx.stroke();
    }

    // Board
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (board[r][c]) drawBlock(ctx, c, r, board[r][c]);
        }
    }

    if (current && !gameOver) {
        // Ghost piece
        const ghostY = getGhostY();
        const ghostBlocks = getBlocks({ ...current, y: ghostY });
        for (const b of ghostBlocks) {
            if (b.y >= 0) drawBlock(ctx, b.x, b.y, current.type, 0.2);
        }

        // Current piece
        const blocks = getBlocks(current);
        for (const b of blocks) {
            if (b.y >= 0) drawBlock(ctx, b.x, b.y, current.type);
        }
    }

    // Draw next piece
    drawNext();
}

function drawNext() {
    nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
    if (!next) return;
    const shape = SHAPES[next.type][0];
    const minX = Math.min(...shape.map(s => s[0]));
    const maxX = Math.max(...shape.map(s => s[0]));
    const minY = Math.min(...shape.map(s => s[1]));
    const maxY = Math.max(...shape.map(s => s[1]));
    const w = maxX - minX + 1;
    const h = maxY - minY + 1;
    const size = 18;
    const offsetX = (nextCanvas.width - w * size) / 2;
    const offsetY = (nextCanvas.height - h * size) / 2;

    for (const [dx, dy] of shape) {
        const px = offsetX + (dx - minX) * size;
        const py = offsetY + (dy - minY) * size;
        nextCtx.fillStyle = COLORS[next.type];
        nextCtx.fillRect(px + 1, py + 1, size - 2, size - 2);
        nextCtx.fillStyle = GLOW[next.type];
        nextCtx.fillRect(px + 1, py + 1, size - 2, 3);
        nextCtx.fillRect(px + 1, py + 1, 3, size - 2);
    }
}

function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('level').textContent = level;
    document.getElementById('lines').textContent = lines;
}

// ==================== GAME LOOP ====================
function gameLoop(timestamp) {
    if (gameOver) {
        endGame();
        return;
    }
    if (!paused) {
        if (timestamp - lastDrop > dropInterval) {
            moveDown();
            lastDrop = timestamp;
        }
        draw();
    }
    animationId = requestAnimationFrame(gameLoop);
}

function startGame() {
    initBoard();
    current = randomPiece();
    next = randomPiece();
    score = 0;
    level = 1;
    lines = 0;
    gameOver = false;
    paused = false;
    dropInterval = 800;
    lastDrop = 0;
    updateUI();
    document.getElementById('start-overlay').classList.add('hidden');
    document.getElementById('gameover-overlay').classList.add('hidden');
    if (animationId) cancelAnimationFrame(animationId);
    animationId = requestAnimationFrame(gameLoop);
}

function endGame() {
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('tetris-highscore', highScore.toString());
    }
    document.getElementById('final-score').textContent = score;
    document.getElementById('high-score-end').textContent = 'En yüksek skor: ' + highScore;
    document.getElementById('gameover-overlay').classList.remove('hidden');
}

// ==================== CONTROLS ====================

// Touch buttons
document.getElementById('btn-left').addEventListener('touchstart', e => { e.preventDefault(); moveLeft(); });
document.getElementById('btn-right').addEventListener('touchstart', e => { e.preventDefault(); moveRight(); });
document.getElementById('btn-rotate').addEventListener('touchstart', e => { e.preventDefault(); rotate(); });
document.getElementById('btn-down').addEventListener('touchstart', e => { e.preventDefault(); moveDown(); });
document.getElementById('btn-drop').addEventListener('touchstart', e => { e.preventDefault(); hardDrop(); });

// Mouse fallback
document.getElementById('btn-left').addEventListener('click', moveLeft);
document.getElementById('btn-right').addEventListener('click', moveRight);
document.getElementById('btn-rotate').addEventListener('click', rotate);
document.getElementById('btn-down').addEventListener('click', moveDown);
document.getElementById('btn-drop').addEventListener('click', hardDrop);

// Keyboard
document.addEventListener('keydown', e => {
    switch(e.key) {
        case 'ArrowLeft': moveLeft(); break;
        case 'ArrowRight': moveRight(); break;
        case 'ArrowDown': moveDown(); break;
        case 'ArrowUp': rotate(); break;
        case ' ': hardDrop(); break;
    }
});

// Swipe gestures on canvas
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
    touchStartTime = Date.now();
});

canvas.addEventListener('touchend', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    const dt = Date.now() - touchStartTime;

    if (dt < 200 && Math.abs(dx) < 20 && Math.abs(dy) < 20) {
        rotate();
    } else if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 30) moveRight();
        else if (dx < -30) moveLeft();
    } else {
        if (dy > 50) hardDrop();
        else if (dy > 20) moveDown();
    }
});

// Start / Restart
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// Show high score
document.getElementById('high-score-start').textContent = highScore > 0 ? 'En yüksek skor: ' + highScore : '';

</script>
</body>
</html>

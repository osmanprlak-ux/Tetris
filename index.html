<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0b0b1e">
    <title>Tetris</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' fill='%230b0b1e'/><rect x='20' y='20' width='60' height='60' rx='8' fill='%2322d3ee'/><rect x='90' y='20' width='60' height='60' rx='8' fill='%23845ef7'/><rect x='20' y='90' width='60' height='60' rx='8' fill='%23f472b6'/><rect x='90' y='90' width='60' height='60' rx='8' fill='%2334d399'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b1e;
            --card: rgba(255,255,255,0.03);
            --card-border: rgba(255,255,255,0.06);
            --accent: #845ef7;
            --accent2: #da77f2;
            --neon-cyan: #22d3ee;
            --neon-pink: #f472b6;
            --neon-green: #34d399;
            --neon-yellow: #fbbf24;
            --neon-orange: #fb923c;
            --neon-red: #f87171;
            --neon-blue: #60a5fa;
            --text: #eeeef8;
            --text-dim: rgba(255,255,255,0.35);
            --gold: #fbbf24;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            max-width: 100vw;
            max-height: 100vh;
            max-height: 100dvh;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Outfit', sans-serif;
            user-select: none;
            color: var(--text);
        }

        /* Animated gradient bg */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(132,94,247,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 90%, rgba(34,211,238,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 60% 40%, rgba(244,114,182,0.06) 0%, transparent 60%);
            animation: bgShift 25s ease-in-out infinite alternate;
            z-index: -1;
        }
        @keyframes bgShift {
            0% { opacity: 1; filter: hue-rotate(0deg); }
            100% { opacity: 1; filter: hue-rotate(30deg); }
        }

        /* Main layout - fit everything in viewport */
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            height: 100dvh;
            padding: 4px 8px;
            padding-top: max(4px, env(safe-area-inset-top));
            padding-bottom: max(4px, env(safe-area-inset-bottom));
            gap: 4px;
        }

        /* === TOP BAR === */
        .top-bar {
            display: flex;
            width: 100%;
            gap: 4px;
            flex-shrink: 0;
        }

        .glass {
            background: var(--card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
        }

        .stats-row {
            display: flex;
            gap: 10px;
            flex: 1;
            align-items: center;
            justify-content: center;
            padding: 6px 8px;
        }

        .stat { text-align: center; }

        .stat-label {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
        }

        .stat-value {
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .stat-value.score-val { color: var(--neon-cyan); text-shadow: 0 0 8px rgba(34,211,238,0.4); }
        .stat-value.level-val { color: var(--accent2); text-shadow: 0 0 8px rgba(218,119,242,0.4); }
        .stat-value.lines-val { color: var(--neon-green); text-shadow: 0 0 8px rgba(52,211,153,0.4); }
        .stat-value.combo-val { color: var(--neon-orange); text-shadow: 0 0 8px rgba(251,146,60,0.4); }

        .side-panels {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .mini-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px 6px;
            min-width: 52px;
        }

        .mini-panel canvas { border-radius: 6px; margin-top: 2px; }

        /* === GAME CANVAS === */
        .canvas-container {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(132,94,247,0.15);
            box-shadow: 0 0 30px rgba(132,94,247,0.08), inset 0 0 40px rgba(0,0,0,0.4);
            flex: 1;
            min-height: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #game-canvas {
            display: block;
            background: rgba(8,8,24,0.95);
            max-width: 100%;
            max-height: 100%;
        }

        .notification {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 900;
            font-size: 28px;
            color: #fff;
            text-shadow: 0 0 20px var(--accent), 0 0 60px var(--accent2);
            pointer-events: none;
            opacity: 0;
            z-index: 10;
        }

        .notification.show {
            animation: notifPop 0.9s ease-out forwards;
        }

        @keyframes notifPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.4) rotate(-5deg); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1.15) rotate(2deg); }
            30% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            100% { opacity: 0; transform: translate(-50%, -75%) scale(0.9); }
        }

        .pause-overlay {
            position: absolute; inset: 0;
            background: rgba(8,8,24,0.88);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 10px;
            z-index: 5; opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .pause-overlay.active { opacity: 1; pointer-events: auto; }
        .pause-overlay .pause-icon { font-size: 40px; color: var(--accent); }
        .pause-overlay .pause-text { font-size: 13px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; }

        /* === CONTROLS === */
        .controls-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-shrink: 0;
            padding: 2px 0;
        }

        .control-row {
            display: grid;
            gap: 5px;
        }
        .control-row.main { grid-template-columns: 1fr 1.4fr 1fr; }
        .control-row.actions { grid-template-columns: 1fr 1fr 1fr; }

        .ctrl-btn {
            position: relative;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: var(--text);
            font-size: 22px;
            font-family: 'Outfit', sans-serif;
            padding: 12px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.12s;
            overflow: hidden;
        }

        .ctrl-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 12px;
            background: radial-gradient(circle at center, var(--accent-glow, rgba(132,94,247,0.15)), transparent 70%);
            opacity: 0;
            transition: opacity 0.12s;
        }

        .ctrl-btn:active {
            transform: scale(0.92);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(132,94,247,0.3);
        }
        .ctrl-btn:active::before { opacity: 1; }

        .ctrl-btn .lbl {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .ctrl-btn.accent { border-color: rgba(132,94,247,0.2); background: rgba(132,94,247,0.06); --accent-glow: rgba(132,94,247,0.2); }
        .ctrl-btn.pink { border-color: rgba(244,114,182,0.2); background: rgba(244,114,182,0.05); --accent-glow: rgba(244,114,182,0.2); }
        .ctrl-btn.pink:active { border-color: var(--neon-pink); box-shadow: 0 0 20px rgba(244,114,182,0.3); }
        .ctrl-btn.cyan { border-color: rgba(34,211,238,0.2); background: rgba(34,211,238,0.05); --accent-glow: rgba(34,211,238,0.2); }
        .ctrl-btn.cyan:active { border-color: var(--neon-cyan); box-shadow: 0 0 20px rgba(34,211,238,0.3); }

        .ctrl-btn.pause-btn {
            padding: 8px 0;
            border-color: rgba(255,255,255,0.05);
        }

        /* === OVERLAYS === */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(8,8,24,0.94);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; gap: 14px; padding: 24px;
            animation: fadeIn 0.4s ease;
        }
        .overlay.hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .overlay-logo {
            font-size: 52px;
            font-weight: 900;
            background: linear-gradient(135deg, #845ef7, #da77f2, #f472b6, #fbbf24, #22d3ee);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            animation: logoShine 4s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(132,94,247,0.4));
        }
        @keyframes logoShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .overlay-subtitle {
            color: var(--text-dim);
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .overlay-btn {
            background: linear-gradient(135deg, #845ef7, #da77f2);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
            padding: 14px 52px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 4px 24px rgba(132,94,247,0.4);
            transition: all 0.2s;
            margin-top: 6px;
        }
        .overlay-btn:active { transform: scale(0.95); }

        .final-score-container { text-align: center; }
        .final-score-label { font-size: 11px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
        .final-score {
            font-family: 'Space Mono', monospace;
            font-size: 50px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 12px rgba(251,191,36,0.3));
        }

        .high-score-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(251,191,36,0.08);
            border: 1px solid rgba(251,191,36,0.15);
            border-radius: 20px; padding: 5px 12px;
            font-size: 11px; color: var(--gold); font-weight: 600;
        }

        .new-record {
            color: var(--gold); font-size: 13px; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase;
            animation: pulse 1s ease-in-out infinite;
            text-shadow: 0 0 12px rgba(251,191,36,0.4);
        }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

        .game-stats-summary { display: flex; gap: 20px; }
        .game-stats-summary .stat-value { font-size: 18px; }

        /* Particles */
        #particles-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 50; }

        /* Sound toggle */
        .sound-toggle {
            position: fixed; bottom: 12px; right: 12px; z-index: 200;
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: 50%; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; cursor: pointer; color: var(--text-dim);
        }
        .overlay .sound-toggle {
            position: static;
            margin-top: 4px;
        }

        /* Responsive scaling */
        @media (max-height: 680px) {
            .ctrl-btn { padding: 10px 0; font-size: 20px; }
            .ctrl-btn.pause-btn { padding: 6px 0; }
            .stat-value { font-size: 14px; }
            .controls-area { gap: 4px; }
        }
        @media (max-height: 600px) {
            .ctrl-btn { padding: 8px 0; font-size: 18px; border-radius: 10px; }
            .ctrl-btn.pause-btn { padding: 5px 0; }
            .stats-row { padding: 4px 6px; }
            .stat-label { font-size: 7px; }
            .stat-value { font-size: 12px; }
            .controls-area { gap: 3px; }
            .game-wrapper { gap: 3px; }
        }
    </style>
</head>
<body>

<button class="sound-toggle" id="sound-toggle">&#128264;</button>
<canvas id="particles-canvas"></canvas>

<div class="game-wrapper">
    <div class="top-bar">
        <div class="glass stats-row">
            <div class="stat">
                <div class="stat-label">Skor</div>
                <div class="stat-value score-val" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Seviye</div>
                <div class="stat-value level-val" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">Satir</div>
                <div class="stat-value lines-val" id="lines">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Combo</div>
                <div class="stat-value combo-val" id="combo">0</div>
            </div>
        </div>
        <div class="side-panels">
            <div class="glass mini-panel">
                <div class="stat-label">Sakla</div>
                <canvas id="hold-canvas" width="48" height="48"></canvas>
            </div>
            <div class="glass mini-panel">
                <div class="stat-label">Sira</div>
                <canvas id="next-canvas" width="48" height="48"></canvas>
            </div>
        </div>
    </div>

    <div class="canvas-container" id="canvas-container">
        <canvas id="game-canvas"></canvas>
        <div class="notification" id="notification"></div>
        <div class="pause-overlay" id="pause-overlay">
            <div class="pause-icon">&#9646;&#9646;</div>
            <div class="pause-text">Durakladi</div>
        </div>
    </div>

    <div class="controls-area">
        <div class="control-row main">
            <button class="ctrl-btn" id="btn-left">&#9664;</button>
            <button class="ctrl-btn accent" id="btn-rotate">&#8635; <span class="lbl">Dondur</span></button>
            <button class="ctrl-btn" id="btn-right">&#9654;</button>
        </div>
        <div class="control-row actions">
            <button class="ctrl-btn cyan" id="btn-down">&#9660;</button>
            <button class="ctrl-btn pink" id="btn-drop">&#9196; <span class="lbl">Birak</span></button>
            <button class="ctrl-btn" id="btn-hold">&#128260; <span class="lbl">Sakla</span></button>
        </div>
        <div class="control-row" style="grid-template-columns:1fr;">
            <button class="ctrl-btn pause-btn" id="btn-pause">
                <span class="lbl" id="pause-label">&#9208; Duraklat</span>
            </button>
        </div>
    </div>
</div>

<!-- Start Overlay -->
<div class="overlay" id="start-overlay">
    <div class="overlay-logo">TETRIS</div>
    <div class="overlay-subtitle">Mobil Tetris Oyunu</div>
    <button class="overlay-btn" id="start-btn">BASLA</button>
    <div class="high-score-badge" id="high-score-start" style="display:none;">
        &#127942; En Yuksek: <span id="hs-value">0</span>
    </div>
    <button class="sound-toggle" id="sound-toggle-overlay">&#128264;</button>
</div>

<!-- Game Over Overlay -->
<div class="overlay hidden" id="gameover-overlay">
    <div class="overlay-logo" style="font-size:34px;">OYUN BITTI</div>
    <div class="final-score-container">
        <div class="final-score-label">Toplam Skor</div>
        <div class="final-score" id="final-score">0</div>
    </div>
    <div class="new-record hidden" id="new-record">&#127942; YENI REKOR!</div>
    <div class="game-stats-summary">
        <div class="stat"><div class="stat-label">Seviye</div><div class="stat-value level-val" id="final-level">1</div></div>
        <div class="stat"><div class="stat-label">Satir</div><div class="stat-value lines-val" id="final-lines">0</div></div>
        <div class="stat"><div class="stat-label">Combo</div><div class="stat-value combo-val" id="final-combo">0</div></div>
    </div>
    <button class="overlay-btn" id="restart-btn">TEKRAR OYNA</button>
    <div class="high-score-badge" id="high-score-end" style="display:none;">
        &#127942; En Yuksek: <span id="hs-value-end">0</span>
    </div>
</div>

<script>
// ==================== AUDIO ====================
class AudioEngine {
    constructor() { this.enabled = true; this.ctx = null; }
    init() { if (this.ctx) return; this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    play(type) {
        if (!this.enabled || !this.ctx) return;
        try {
            const now = this.ctx.currentTime;
            const o = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            o.connect(g); g.connect(this.ctx.destination);
            switch(type) {
                case 'move': o.frequency.setValueAtTime(220,now); g.gain.setValueAtTime(0.04,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.04); o.start(now); o.stop(now+0.04); break;
                case 'rotate': o.frequency.setValueAtTime(440,now); o.frequency.exponentialRampToValueAtTime(660,now+0.07); g.gain.setValueAtTime(0.06,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.07); o.start(now); o.stop(now+0.07); break;
                case 'drop': o.type='triangle'; o.frequency.setValueAtTime(160,now); o.frequency.exponentialRampToValueAtTime(40,now+0.12); g.gain.setValueAtTime(0.12,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.12); o.start(now); o.stop(now+0.12); break;
                case 'clear': o.type='sine'; o.frequency.setValueAtTime(523,now); o.frequency.setValueAtTime(659,now+0.07); o.frequency.setValueAtTime(784,now+0.14); g.gain.setValueAtTime(0.1,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.28); o.start(now); o.stop(now+0.28); break;
                case 'tetris': o.type='square'; [523,659,784,1047].forEach((f,i)=>o.frequency.setValueAtTime(f,now+i*0.05)); g.gain.setValueAtTime(0.08,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.35); o.start(now); o.stop(now+0.35); break;
                case 'gameover': o.type='sawtooth'; o.frequency.setValueAtTime(400,now); o.frequency.exponentialRampToValueAtTime(80,now+0.5); g.gain.setValueAtTime(0.08,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.5); o.start(now); o.stop(now+0.5); break;
                case 'hold': o.frequency.setValueAtTime(330,now); o.frequency.setValueAtTime(520,now+0.05); g.gain.setValueAtTime(0.06,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.08); o.start(now); o.stop(now+0.08); break;
                case 'levelup': o.type='sine'; [523,659,784,1047,784,1047].forEach((f,i)=>o.frequency.setValueAtTime(f,now+i*0.06)); g.gain.setValueAtTime(0.08,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.4); o.start(now); o.stop(now+0.4); break;
            }
        } catch(e){}
    }
    toggle() { this.enabled = !this.enabled; return this.enabled; }
}
const audio = new AudioEngine();

// ==================== PARTICLES ====================
const pCanvas = document.getElementById('particles-canvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeP() { pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight; }
resizeP(); window.addEventListener('resize', resizeP);

class Particle {
    constructor(x,y,color) {
        this.x=x; this.y=y; this.color=color;
        this.vx=(Math.random()-0.5)*10;
        this.vy=(Math.random()-0.5)*10 - 2;
        this.life=1; this.decay=0.018+Math.random()*0.025;
        this.size=2+Math.random()*5;
        this.rotation = Math.random()*Math.PI*2;
        this.rotSpeed = (Math.random()-0.5)*0.3;
    }
    update() { this.x+=this.vx; this.y+=this.vy; this.vy+=0.18; this.life-=this.decay; this.rotation+=this.rotSpeed; this.vx*=0.98; }
    draw(c) {
        c.save();
        c.globalAlpha=this.life*this.life;
        c.translate(this.x, this.y);
        c.rotate(this.rotation);
        c.fillStyle=this.color;
        c.shadowColor=this.color;
        c.shadowBlur=6;
        c.fillRect(-this.size/2,-this.size/2,this.size,this.size);
        c.restore();
    }
}

function spawnParticles(worldX, worldY, color, count) {
    const rect = canvas.getBoundingClientRect();
    const sx = rect.width/canvas.width, sy = rect.height/canvas.height;
    const screenX = rect.left+worldX*sx, screenY = rect.top+worldY*sy;
    for (let i=0;i<count;i++) particles.push(new Particle(screenX,screenY,color));
}

function updateParticles() {
    pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
    particles = particles.filter(p=>p.life>0);
    for (const p of particles) { p.update(); p.draw(pCtx); }
}

// ==================== TETRIS ====================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nextCtx = nextCanvas.getContext('2d');
const holdCanvas = document.getElementById('hold-canvas');
const holdCtx = holdCanvas.getContext('2d');

const COLS=10, ROWS=20;
let BLOCK=30;

// Vibrant neon colors
const COLORS = {
    I:'#22d3ee', O:'#fbbf24', T:'#c084fc',
    S:'#34d399', Z:'#f87171', J:'#60a5fa', L:'#fb923c'
};
const GLOW = {
    I:'#67e8f9', O:'#fde68a', T:'#d8b4fe',
    S:'#6ee7b7', Z:'#fca5a5', J:'#93c5fd', L:'#fdba74'
};
const DARK = {
    I:'#0891b2', O:'#d97706', T:'#7c3aed',
    S:'#059669', Z:'#dc2626', J:'#2563eb', L:'#ea580c'
};

const SHAPES = {
    I:[[[0,0],[1,0],[2,0],[3,0]],[[0,0],[0,1],[0,2],[0,3]]],
    O:[[[0,0],[1,0],[0,1],[1,1]]],
    T:[[[0,0],[1,0],[2,0],[1,1]],[[0,0],[0,1],[0,2],[1,1]],[[1,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[1,2],[0,1]]],
    S:[[[1,0],[2,0],[0,1],[1,1]],[[0,0],[0,1],[1,1],[1,2]]],
    Z:[[[0,0],[1,0],[1,1],[2,1]],[[1,0],[1,1],[0,1],[0,2]]],
    J:[[[0,0],[0,1],[1,1],[2,1]],[[0,0],[1,0],[0,1],[0,2]],[[0,0],[1,0],[2,0],[2,1]],[[1,0],[1,1],[1,2],[0,2]]],
    L:[[[2,0],[0,1],[1,1],[2,1]],[[0,0],[0,1],[0,2],[1,2]],[[0,0],[1,0],[2,0],[0,1]],[[0,0],[1,0],[1,1],[1,2]]]
};

const PIECE_TYPES=['I','O','T','S','Z','J','L'];
let board,current,next,holdPiece,canHold;
let score,level,lines,combo,maxCombo;
let gameOver,paused,dropInterval,lastDrop,animationId;
let highScore=parseInt(localStorage.getItem('tetris-hs-v3')||'0');
let bag=[];

function fillBag(){bag=[...PIECE_TYPES];for(let i=bag.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[bag[i],bag[j]]=[bag[j],bag[i]];}}
function nextFromBag(){if(!bag.length)fillBag();return bag.pop();}
function makePiece(t){return{type:t,rotation:0,x:Math.floor(COLS/2)-1,y:0};}
function initBoard(){board=[];for(let r=0;r<ROWS;r++)board.push(new Array(COLS).fill(null));}
function getBlocks(p){const s=SHAPES[p.type][p.rotation%SHAPES[p.type].length];return s.map(([dx,dy])=>({x:p.x+dx,y:p.y+dy}));}
function isValid(p){for(const b of getBlocks(p)){if(b.x<0||b.x>=COLS||b.y>=ROWS)return false;if(b.y>=0&&board[b.y][b.x])return false;}return true;}

function lockPiece(){
    const blocks=getBlocks(current);
    for(const b of blocks){if(b.y<0){gameOver=true;return;}board[b.y][b.x]=current.type;}
    clearLines();
    current=next; next=makePiece(nextFromBag()); canHold=true;
    if(!isValid(current))gameOver=true;
}

function clearLines(){
    let cleared=0;
    for(let r=ROWS-1;r>=0;r--){
        if(board[r].every(c=>c!==null)){
            for(let c=0;c<COLS;c++) spawnParticles(c*BLOCK+BLOCK/2,r*BLOCK+BLOCK/2,COLORS[board[r][c]],5);
            board.splice(r,1); board.unshift(new Array(COLS).fill(null)); cleared++; r++;
        }
    }
    if(cleared>0){
        combo++; if(combo>maxCombo)maxCombo=combo;
        let pts=[0,100,300,500,800][cleared]*level;
        if(combo>1) pts+=combo*50*level;
        score+=pts;
        const prev=level; lines+=cleared; level=Math.floor(lines/10)+1;
        dropInterval=Math.max(80,800-(level-1)*65);
        if(cleared===4){showNotification('TETRIS!');audio.play('tetris');}
        else if(combo>2){showNotification(combo+'x COMBO!');audio.play('clear');}
        else audio.play('clear');
        if(level>prev){showNotification('SEVIYE '+level+'!');audio.play('levelup');}
        updateUI();
    } else combo=0;
}

function showNotification(t){const e=document.getElementById('notification');e.textContent=t;e.classList.remove('show');void e.offsetWidth;e.classList.add('show');}
function getGhostY(){let y=current.y;while(isValid({...current,y:y+1}))y++;return y;}
function moveLeft(){if(gameOver||paused)return;const m={...current,x:current.x-1};if(isValid(m)){current=m;audio.play('move');}}
function moveRight(){if(gameOver||paused)return;const m={...current,x:current.x+1};if(isValid(m)){current=m;audio.play('move');}}
function moveDown(){if(gameOver||paused)return;const m={...current,y:current.y+1};if(isValid(m)){current=m;score+=1;updateUI();}else lockPiece();}
function rotate(){if(gameOver||paused)return;const mr=SHAPES[current.type].length;const r={...current,rotation:(current.rotation+1)%mr};for(const k of[0,-1,1,-2,2]){const kk={...r,x:r.x+k};if(isValid(kk)){current=kk;audio.play('rotate');return;}}}
function hardDrop(){
    if(gameOver||paused)return;
    while(isValid({...current,y:current.y+1}))current.y++;
    const blocks=getBlocks(current);
    for(const b of blocks)spawnParticles(b.x*BLOCK+BLOCK/2,b.y*BLOCK+BLOCK/2,COLORS[current.type],3);
    score+=getBlocks(current).length*2; audio.play('drop'); lockPiece(); updateUI();
}
function holdCurrentPiece(){
    if(gameOver||paused||!canHold)return; canHold=false; audio.play('hold');
    if(holdPiece){const t=holdPiece;holdPiece=current.type;current=makePiece(t);}
    else{holdPiece=current.type;current=next;next=makePiece(nextFromBag());}
}
function togglePause(){
    if(gameOver)return; paused=!paused;
    document.getElementById('pause-overlay').classList.toggle('active',paused);
    document.getElementById('pause-label').innerHTML=paused?'&#9654; Devam':'&#9208; Duraklat';
}

// ==================== DRAWING ====================
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

function drawBlock(c,x,y,type,alpha=1,bs=BLOCK){
    const px=x*bs, py=y*bs, r=bs>16?4:2, pad=1;
    c.globalAlpha=alpha;

    // Outer glow
    c.shadowColor=COLORS[type];
    c.shadowBlur=bs>16?8:3;

    // Main fill
    c.fillStyle=COLORS[type];
    roundRect(c,px+pad,py+pad,bs-pad*2,bs-pad*2,r);
    c.fill();
    c.shadowBlur=0;

    // Inner gradient overlay
    const grad=c.createLinearGradient(px,py,px,py+bs);
    grad.addColorStop(0,'rgba(255,255,255,0.25)');
    grad.addColorStop(0.4,'rgba(255,255,255,0.05)');
    grad.addColorStop(1,'rgba(0,0,0,0.15)');
    c.fillStyle=grad;
    roundRect(c,px+pad,py+pad,bs-pad*2,bs-pad*2,r);
    c.fill();

    // Shine dot
    c.fillStyle='rgba(255,255,255,0.5)';
    c.beginPath();
    c.arc(px+bs*0.28,py+bs*0.28,bs*0.07,0,Math.PI*2);
    c.fill();

    c.globalAlpha=1;
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Subtle grid
    ctx.strokeStyle='rgba(255,255,255,0.02)';
    ctx.lineWidth=0.5;
    for(let c=1;c<COLS;c++){ctx.beginPath();ctx.moveTo(c*BLOCK,0);ctx.lineTo(c*BLOCK,canvas.height);ctx.stroke();}
    for(let r=1;r<ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*BLOCK);ctx.lineTo(canvas.width,r*BLOCK);ctx.stroke();}

    // Board blocks
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c])drawBlock(ctx,c,r,board[r][c]);

    if(current&&!gameOver){
        // Ghost piece (outline only)
        const gy=getGhostY();
        const gb=getBlocks({...current,y:gy});
        ctx.globalAlpha=0.12;
        ctx.strokeStyle=COLORS[current.type];
        ctx.shadowColor=COLORS[current.type];
        ctx.shadowBlur=4;
        ctx.lineWidth=1.5;
        for(const b of gb){if(b.y>=0){roundRect(ctx,b.x*BLOCK+2,b.y*BLOCK+2,BLOCK-4,BLOCK-4,3);ctx.stroke();}}
        ctx.shadowBlur=0;
        ctx.globalAlpha=1;

        // Current piece
        for(const b of getBlocks(current)){if(b.y>=0)drawBlock(ctx,b.x,b.y,current.type);}
    }

    drawMini(nextCtx,nextCanvas,next);
    drawMini(holdCtx,holdCanvas,holdPiece?makePiece(holdPiece):null);
}

function drawMini(c,cvs,piece){
    c.clearRect(0,0,cvs.width,cvs.height);
    if(!piece)return;
    const shape=SHAPES[piece.type][0];
    const xs=shape.map(s=>s[0]),ys=shape.map(s=>s[1]);
    const w=Math.max(...xs)-Math.min(...xs)+1, h=Math.max(...ys)-Math.min(...ys)+1;
    const sz=10;
    const ox=(cvs.width-w*sz)/2-Math.min(...xs)*sz, oy=(cvs.height-h*sz)/2-Math.min(...ys)*sz;
    for(const[dx,dy]of shape){
        const px=ox+dx*sz, py=oy+dy*sz;
        c.fillStyle=COLORS[piece.type];
        c.shadowColor=COLORS[piece.type];
        c.shadowBlur=4;
        roundRect(c,px+0.5,py+0.5,sz-1,sz-1,2);
        c.fill();
        c.shadowBlur=0;
        const g=c.createLinearGradient(px,py,px,py+sz);
        g.addColorStop(0,'rgba(255,255,255,0.3)');
        g.addColorStop(1,'rgba(0,0,0,0.1)');
        c.fillStyle=g;
        roundRect(c,px+0.5,py+0.5,sz-1,sz-1,2);
        c.fill();
    }
}

function updateUI(){
    document.getElementById('score').textContent=score.toLocaleString();
    document.getElementById('level').textContent=level;
    document.getElementById('lines').textContent=lines;
    document.getElementById('combo').textContent=combo;
}

// ==================== RESIZE CANVAS TO FIT ====================
function resizeCanvas(){
    const container=document.getElementById('canvas-container');
    const cw=container.clientWidth, ch=container.clientHeight;
    // Calculate block size to fit
    const bw=Math.floor(cw/COLS), bh=Math.floor(ch/ROWS);
    BLOCK=Math.min(bw,bh,30);
    canvas.width=COLS*BLOCK;
    canvas.height=ROWS*BLOCK;
}

window.addEventListener('resize',resizeCanvas);

// ==================== GAME LOOP ====================
function gameLoop(ts){
    if(gameOver){endGame();return;}
    if(!paused){
        if(ts-lastDrop>dropInterval){moveDown();lastDrop=ts;}
        draw();
    }
    updateParticles();
    animationId=requestAnimationFrame(gameLoop);
}

function startGame(){
    audio.init(); initBoard(); bag=[]; fillBag();
    current=makePiece(nextFromBag()); next=makePiece(nextFromBag());
    holdPiece=null; canHold=true;
    score=0; level=1; lines=0; combo=0; maxCombo=0;
    gameOver=false; paused=false; dropInterval=800; lastDrop=0;
    particles=[];
    resizeCanvas(); updateUI();
    document.getElementById('start-overlay').classList.add('hidden');
    document.getElementById('gameover-overlay').classList.add('hidden');
    document.getElementById('pause-overlay').classList.remove('active');
    document.getElementById('pause-label').innerHTML='&#9208; Duraklat';
    if(animationId)cancelAnimationFrame(animationId);
    animationId=requestAnimationFrame(gameLoop);
}

function endGame(){
    audio.play('gameover');
    const nr=score>highScore;
    if(nr){highScore=score;localStorage.setItem('tetris-hs-v3',highScore.toString());}
    document.getElementById('final-score').textContent=score.toLocaleString();
    document.getElementById('final-level').textContent=level;
    document.getElementById('final-lines').textContent=lines;
    document.getElementById('final-combo').textContent=maxCombo;
    const nrEl=document.getElementById('new-record');
    nr?nrEl.classList.remove('hidden'):nrEl.classList.add('hidden');
    if(highScore>0){document.getElementById('high-score-end').style.display='';document.getElementById('hs-value-end').textContent=highScore.toLocaleString();}
    document.getElementById('gameover-overlay').classList.remove('hidden');
}

// ==================== CONTROLS ====================
// DAS (Delayed Auto Shift) system - fast & responsive like real Tetris
const DAS_DELAY = 120;  // ms before auto-repeat starts
const ARR_SPEED = 30;   // ms between repeats (very fast)

function addTouch(id, fn, repeat) {
    const el = document.getElementById(id);
    let dasTimer = null, arrTimer = null, active = false;

    const stop = () => {
        active = false;
        clearTimeout(dasTimer); clearInterval(arrTimer);
        dasTimer = null; arrTimer = null;
    };

    const start = () => {
        if (active) return;
        active = true;
        fn(); // instant first move
        if (repeat) {
            dasTimer = setTimeout(() => {
                fn(); // fire once at DAS threshold
                arrTimer = setInterval(fn, ARR_SPEED); // then rapid repeat
            }, DAS_DELAY);
        }
    };

    el.addEventListener('touchstart', e => { e.preventDefault(); start(); }, { passive: false });
    el.addEventListener('touchend', e => { e.preventDefault(); stop(); }, { passive: false });
    el.addEventListener('touchcancel', stop);
    // Mouse fallback for desktop
    el.addEventListener('mousedown', e => { e.preventDefault(); start(); });
    el.addEventListener('mouseup', stop);
    el.addEventListener('mouseleave', stop);
}

addTouch('btn-left', moveLeft, true);
addTouch('btn-right', moveRight, true);
addTouch('btn-down', moveDown, true);
addTouch('btn-rotate', rotate, false);
addTouch('btn-drop', hardDrop, false);
addTouch('btn-hold', holdCurrentPiece, false);
addTouch('btn-pause', togglePause, false);

// Keyboard with DAS/ARR
const keyState = {};
const keyMap = { ArrowLeft: moveLeft, ArrowRight: moveRight, ArrowDown: moveDown };

document.addEventListener('keydown', e => {
    if (e.repeat && (e.key in keyMap)) return; // we handle repeat ourselves
    if (e.key === 'p' || e.key === 'Escape') { togglePause(); return; }
    if (e.key === 'c' || e.key === 'C') { holdCurrentPiece(); return; }
    if (e.key === 'ArrowUp') { rotate(); return; }
    if (e.key === ' ') { e.preventDefault(); hardDrop(); return; }

    const fn = keyMap[e.key];
    if (fn && !keyState[e.key]) {
        keyState[e.key] = true;
        fn();
        keyState[e.key + '_das'] = setTimeout(() => {
            fn();
            keyState[e.key + '_arr'] = setInterval(fn, ARR_SPEED);
        }, DAS_DELAY);
    }
});

document.addEventListener('keyup', e => {
    if (keyState[e.key]) {
        keyState[e.key] = false;
        clearTimeout(keyState[e.key + '_das']);
        clearInterval(keyState[e.key + '_arr']);
    }
});

// Swipe on canvas
let tx=0,ty=0,tt=0;
canvas.addEventListener('touchstart',e=>{e.preventDefault();tx=e.touches[0].clientX;ty=e.touches[0].clientY;tt=Date.now();});
canvas.addEventListener('touchend',e=>{
    e.preventDefault();
    const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty,dt=Date.now()-tt;
    if(dt<200&&Math.abs(dx)<20&&Math.abs(dy)<20)rotate();
    else if(Math.abs(dx)>Math.abs(dy)){if(dx>30)moveRight();else if(dx<-30)moveLeft();}
    else{if(dy>50)hardDrop();else if(dy>20)moveDown();}
});

// Sound toggle
function toggleSound() {
    audio.init();
    const on = audio.toggle();
    const icon = on ? '&#128264;' : '&#128263;';
    document.getElementById('sound-toggle').innerHTML = icon;
    const overlay = document.getElementById('sound-toggle-overlay');
    if (overlay) overlay.innerHTML = icon;
}
document.getElementById('sound-toggle').addEventListener('click', toggleSound);
document.getElementById('sound-toggle-overlay').addEventListener('click', toggleSound);

// Start/Restart
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('restart-btn').addEventListener('click',startGame);

// High score display
if(highScore>0){document.getElementById('high-score-start').style.display='';document.getElementById('hs-value').textContent=highScore.toLocaleString();}

// Initial resize
resizeCanvas();

// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
